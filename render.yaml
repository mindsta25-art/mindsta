services:
  - type: web
    name: mindsta-backend2
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        value: https://mindsta.com.ng/payment/callback
      - key: ALLOWED_ORIGINS
        value: https://mindsta.com.ng,https://www.mindsta.com.ng
      - key: FRONTEND_URL
        value: https://mindsta.com.ng
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://api.mindsta.com.ng/api/auth/google/callback
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        value: "Mindsta <noreply@mindsta.com.ng>"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: "Mindsta <noreply@mindsta.com.ng>"
